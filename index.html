<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italy Villa Vote — Summer Holiday</title>
<style>
  :root {
    --bg: #f7f5f0;
    --card: #ffffff;
    --ink: #2b2b2b;
    --muted: #71716b;
    --accent: #0d7a5f;
    --accent-soft: #e3f2ec;
    --gold: #b8860b;
    --border: #e6e2d8;
    --danger: #b04a3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }
  header {
    text-align: center;
    padding: 40px 20px 12px;
  }
  header h1 { font-size: 1.9rem; letter-spacing: -0.02em; }
  header p { color: var(--muted); margin-top: 6px; }

  .voter-bar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(247, 245, 240, 0.95);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    align-items: center;
  }
  .voter-bar label { font-weight: 600; }
  .voter-bar input {
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    min-width: 200px;
    background: #fff;
  }
  .voter-bar input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .sync {
    font-size: 0.78rem;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
    background: #eee;
    color: var(--muted);
  }
  .sync.ok { background: var(--accent-soft); color: var(--accent); }
  .sync.bad { background: #f7e5e1; color: var(--danger); }

  .leaderboard {
    max-width: 1160px;
    margin: 20px auto 0;
    padding: 0 20px;
  }
  .leaderboard-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
  }
  .leaderboard-box h2 { font-size: 1.05rem; margin-bottom: 10px; }
  .lb-row { display: flex; flex-direction: column; gap: 5px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .lb-row:last-child { border-bottom: none; padding-bottom: 2px; }
  .lb-row:hover .lb-name { color: var(--accent); text-decoration: underline; }
  .lb-top { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
  .lb-rank { flex: 0 0 auto; font-size: 0.9rem; }
  .lb-name { flex: 1; min-width: 0; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lb-count { flex: 0 0 auto; color: var(--muted); font-size: 0.85rem; white-space: nowrap; }
  .lb-bar-track { background: var(--accent-soft); border-radius: 6px; height: 8px; overflow: hidden; }
  .lb-bar { background: var(--accent); height: 100%; border-radius: 6px; transition: width 0.4s ease; }
  .lb-voters { display: flex; flex-wrap: wrap; gap: 4px; }
  .voter-chip {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 1px 9px;
    font-size: 0.75rem; color: var(--muted);
  }
  .lb-empty { color: var(--muted); font-style: italic; }
  .copy-btn {
    margin-top: 12px;
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .copy-btn:hover { background: var(--accent-soft); }

  .grid {
    max-width: 1160px;
    margin: 24px auto 60px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 24px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }
  .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.09); transform: translateY(-2px); }
  .card.voted-by-me { outline: 3px solid var(--accent); }
  .card { scroll-margin-top: 84px; }   /* clear the sticky name bar when scrolled to */
  .card.flash { animation: cardFlash 1.4s ease; }
  @keyframes cardFlash {
    0%, 100% { box-shadow: none; }
    25% { box-shadow: 0 0 0 5px var(--accent); }
    65% { box-shadow: 0 0 0 5px var(--accent); }
  }

  .card-img { position: relative; aspect-ratio: 16 / 10; background: #ddd; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .score-badge {
    position: absolute; top: 10px; left: 10px;
    background: rgba(20, 20, 20, 0.8);
    color: #fff;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.85rem;
  }
  .rank-badge {
    position: absolute; top: 10px; right: 10px;
    background: var(--gold);
    color: #fff;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.8rem;
  }
  .eliminated .card-img img { filter: grayscale(0.55); }

  .gal-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px; border-radius: 50%;
    border: none; background: rgba(255,255,255,0.85); color: #222;
    font-size: 28px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s ease;
  }
  .card-img:hover .gal-btn { opacity: 1; }
  @media (hover: none) { .gal-btn { opacity: 1; } }
  .gal-btn.prev { left: 8px; }
  .gal-btn.next { right: 8px; }
  .gal-btn:hover { background: #fff; }
  .gal-count {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(20, 20, 20, 0.65); color: #fff;
    padding: 2px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600;
  }
  .card-img img.wipe-left { animation: wipeInLeft 0.25s ease; }
  .card-img img.wipe-right { animation: wipeInRight 0.25s ease; }
  @keyframes wipeInLeft { from { transform: translateX(28px); opacity: 0.4; } }
  @keyframes wipeInRight { from { transform: translateX(-28px); opacity: 0.4; } }

  .card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; flex: 1; gap: 8px; }
  .card-body h3 { font-size: 1.12rem; letter-spacing: -0.01em; }
  .card-body h3 a { color: var(--ink); text-decoration: none; }
  .card-body h3 a:hover { color: var(--accent); text-decoration: underline; }
  .location { color: var(--muted); font-size: 0.9rem; text-decoration: none; display: block; width: fit-content; }
  .location:hover { color: var(--accent); text-decoration: underline; }

  .stats { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
  .stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 0.8rem;
    color: var(--ink);
    white-space: nowrap;
  }
  .rec { font-size: 0.85rem; font-weight: 600; color: var(--accent); }
  .rec.negative { color: var(--danger); }
  .notes { font-size: 0.87rem; color: var(--muted); flex: 1; }

  .vote-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
  .vote-btn {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 11px 0;
    font-size: 0.97rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .vote-btn:hover { background: #0a6650; }
  .vote-btn.mine { background: var(--danger); }
  .vote-count { font-weight: 700; font-size: 1rem; min-width: 70px; text-align: right; }
  .vote-count span { color: var(--muted); font-weight: 400; font-size: 0.8rem; }
  .voters { font-size: 0.78rem; color: var(--muted); min-height: 1.1em; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #222; color: #fff; padding: 10px 22px; border-radius: 30px;
    font-size: 0.9rem; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    z-index: 50;
  }
  .toast.show { opacity: 1; }

</style>
</head>

<header>
  <h1>🇮🇹 Summer Holiday Villa Vote</h1>
  <p>15 shortlisted villas &middot; ranked by our weighted score &middot; click a photo or title to open the Airbnb listing</p>
</header>

<div class="voter-bar">

  <input id="voterName" type="text" placeholder="e.g. Dmitrijus" autocomplete="off">

<div class="leaderboard">

    <div id="lbRows"><div class="lb-empty">No votes yet — be the first!</div></div>
    <button class="copy-btn" id="copyResults">📋 Copy results to share</button>
  </div>
</div>

<main class="grid" id="grid"></main>

<div class="toast" id="toast"></div>

const STORAGE_KEY = 'villaVotes2026';
// Shared vote store — Google Apps Script web app writing to the family Google Sheet.
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwcxwIyD1IpK2VP3eBfE_IW1Hqgp71_Dmc7DWlVSNJVbs5QKJ2v7fkf5N1txLkUmYM0/exec';
const POLL_MS = 8000;

// votes: { voterName: [venueId, ...] } — in-memory state, mirrored to localStorage as offline fallback
let votes = normalize(loadLocal());

// Accepts both the old single-pick format (string) and the new multi-pick format (array)
function normalize(v) {
  const out = {};
  for (const [name, val] of Object.entries(v || {})) {
    out[name] = Array.isArray(val) ? val.map(String) : [String(val)];
  }
  return out;
}

function loadLocal() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch (e) { return {}; }
}
function saveLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(votes)); }

function setSyncStatus(state) {
  const el = document.getElementById('syncStatus');
  if (state === 'ok') { el.className = 'sync ok'; el.textContent = '🟢 live sync'; }
  else if (state === 'bad') { el.className = 'sync bad'; el.textContent = '🔴 offline — votes saved on this device'; }
  else { el.className = 'sync'; el.textContent = '⏳ connecting…'; }
}

async function fetchRemote() {
  const res = await fetch(WEB_APP_URL + '?_=' + Date.now());
  if (!res.ok) throw new Error('read failed: ' + res.status);
  const data = await res.json();
  return normalize(data.votes);
}

async function pushRemote(name) {
  // string body keeps it a "simple" CORS request (no preflight needed)
  const res = await fetch(WEB_APP_URL, {
    method: 'POST',
    body: JSON.stringify({ name: name, villas: votes[name] || [] })
  });
  if (!res.ok) throw new Error('write failed: ' + res.status);
  const data = await res.json();
  return normalize(data.votes);
}

async function refresh() {
  if (WEB_APP_URL.startsWith('__')) { setSyncStatus('bad'); return; }
  try {
    const remote = await fetchRemote();
    const changed = JSON.stringify(remote) !== JSON.stringify(votes);
    votes = remote;
    saveLocal();
    setSyncStatus('ok');
    if (changed) render();
  } catch (e) {
    setSyncStatus('bad');
  }
}

const grid = document.getElementById('grid');
const toast = document.getElementById('toast');
let toastTimer;

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

function currentVoter() {
  return document.getElementById('voterName').value.trim();
}

// Per-card photo carousel — index survives re-renders from vote/poll updates
const galleryIdx = {};
function getIdx(v) {
  const n = v.images.length;
  return (((galleryIdx[v.id] || 0) % n) + n) % n;
}
function stepGallery(id, dir) {
  const v = VENUES.find(x => x.id === id);
  if (v.images.length < 2) return;
  galleryIdx[id] = getIdx(v) + dir;
  const idx = getIdx(v);
  const wrap = grid.querySelector(`[data-gal="${id}"]`);
  const img = wrap.querySelector('img');
  img.src = v.images[idx];
  img.classList.remove('wipe-left', 'wipe-right');
  void img.offsetWidth;   // restart the animation even on rapid steps
  img.classList.add(dir > 0 ? 'wipe-left' : 'wipe-right');
  wrap.querySelector('.gal-count').textContent = `${idx + 1} / ${v.images.length}`;
  // warm up the next image in the browsing direction so flicking through feels instant
  new Image().src = v.images[(((idx + dir) % v.images.length) + v.images.length) % v.images.length];
}

function votesByVenue() {
  const map = {};
  for (const [voter, ids] of Object.entries(votes)) {
    for (const id of ids) (map[id] = map[id] || []).push(voter);
  }
  return map;
}

function render() {
  const byVenue = votesByVenue();
  const me = currentVoter();
  const myVotes = votes[me] || [];

  grid.innerHTML = '';
  VENUES.forEach((v, i) => {
    const voters = byVenue[v.id] || [];
    const isMine = me && myVotes.includes(v.id);
    const card = document.createElement('article');
    card.id = `villa-${v.id}`;
    card.className = 'card' + (v.eliminated ? ' eliminated' : '') + (isMine ? ' voted-by-me' : '');
    card.innerHTML = `
      <a class="card-img" href="${v.url}" target="_blank" rel="noopener" data-gal="${v.id}">
        <img src="${v.images[getIdx(v)]}" alt="${v.name}" loading="lazy">
        <span class="score-badge">★ ${v.score}</span>
        ${i < 3 ? `<span class="rank-badge">#${i + 1} pick</span>` : ''}
        ${v.images.length > 1 ? `
        <button class="gal-btn prev" data-id="${v.id}" data-dir="-1" aria-label="Previous photo">‹</button>
        <button class="gal-btn next" data-id="${v.id}" data-dir="1" aria-label="Next photo">›</button>
        <div class="gal-count">${getIdx(v) + 1} / ${v.images.length}</div>` : ''}
      </a>
      <div class="card-body">
        <h3><a href="${v.url}" target="_blank" rel="noopener">${v.name}</a></h3>
        <a class="location" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${v.town.split('/')[0].trim()}, ${v.region.split('/')[0].trim()}, Italy`)}" target="_blank" rel="noopener" title="Show on Google Maps">📍 ${v.town}, ${v.region}</a>
        <div class="stats">
          <span class="stat">👥 ${v.guests} guests</span>
          <span class="stat">🛏 ${v.bedrooms} bed&shy;rooms / ${v.beds} beds</span>
          <span class="stat">🛁 ${v.baths} baths</span>
          <span class="stat">⭐ ${v.rating} (${v.reviews})</span>
          <span class="stat">🌊 ${v.sea}</span>
        </div>
        <div class="rec ${v.eliminated ? 'negative' : ''}">${v.rec}</div>
        <div class="notes">${v.notes}</div>
        <div class="vote-row">
          <button class="vote-btn ${isMine ? 'mine' : ''}" data-id="${v.id}">
            ${isMine ? '✓ Voted — tap to unvote' : '🗳 Vote for this villa'}
          </button>
          <div class="vote-count">${voters.length} <span>vote${voters.length === 1 ? '' : 's'}</span></div>
        </div>
        <div class="voters">${voters.length ? '🙋 ' + voters.join(', ') : ''}</div>
      </div>`;
    grid.appendChild(card);
  });

  grid.querySelectorAll('.vote-btn').forEach(btn => {
    btn.addEventListener('click', () => vote(btn.dataset.id));
  });

  grid.querySelectorAll('.gal-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      stepGallery(btn.dataset.id, Number(btn.dataset.dir));
    });
  });

  // Swipe left/right on the photo to browse the gallery (a swipe must not open the Airbnb link)
  grid.querySelectorAll('.card-img').forEach(a => {
    let startX = 0, startY = 0, swiped = false;
    a.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      swiped = false;
    }, { passive: true });
    a.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        swiped = true;
        stepGallery(a.dataset.gal, dx < 0 ? 1 : -1);
      }
    }, { passive: true });
    a.addEventListener('click', e => {
      if (swiped) { e.preventDefault(); swiped = false; }
    });
  });

  renderLeaderboard(byVenue);
}

function renderLeaderboard(byVenue) {
  const rows = document.getElementById('lbRows');
  const entries = VENUES
    .map(v => ({ v, voters: byVenue[v.id] || [] }))
    .filter(e => e.voters.length > 0)
    .sort((a, b) => b.voters.length - a.voters.length);

  if (!entries.length) {
    rows.innerHTML = '<div class="lb-empty">No votes yet — be the first!</div>';
    return;
  }
  const max = entries[0].voters.length;
  const medals = ['🥇', '🥈', '🥉'];
  rows.innerHTML = entries.map((e, i) => `
    <div class="lb-row" data-id="${e.v.id}" title="Scroll to ${e.v.name}">
      <div class="lb-top">
        <span class="lb-rank">${medals[i] || `${i + 1}.`}</span>
        <span class="lb-name">${e.v.name}</span>
        <span class="lb-count">${e.voters.length} vote${e.voters.length === 1 ? '' : 's'}</span>
      </div>
      <div class="lb-bar-track"><div class="lb-bar" style="width:${(e.voters.length / max) * 100}%"></div></div>
      <div class="lb-voters">${e.voters.map(n => `<span class="voter-chip">${n}</span>`).join('')}</div>
    </div>`).join('');

  rows.querySelectorAll('.lb-row').forEach(row => {
    row.addEventListener('click', () => {
      const card = document.getElementById(`villa-${row.dataset.id}`);
      if (!card) return;
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      card.classList.remove('flash');
      void card.offsetWidth;   // restart the animation on repeat clicks
      card.classList.add('flash');
    });
  });
}

async function vote(venueId) {
  const me = currentVoter();
  if (!me) {
    showToast('Please type your name first ☝️');
    document.getElementById('voterName').focus();
    return;
  }
  // Read latest shared state first so we never clobber someone else's fresh vote
  let synced = true;
  if (!WEB_APP_URL.startsWith('__')) {
    try { votes = await fetchRemote(); }
    catch (e) { synced = false; }
  } else { synced = false; }

  const venue = VENUES.find(v => v.id === venueId);
  const mine = votes[me] || [];
  if (mine.includes(venueId)) {
    votes[me] = mine.filter(id => id !== venueId);
    showToast(`Removed ${venue.name} from your picks`);
  } else {
    votes[me] = [...mine, venueId];
    showToast(`${me} voted for ${venue.name} 🎉`);
  }
  saveLocal();
  render();

  if (synced) {
    try { votes = await pushRemote(me); saveLocal(); render(); setSyncStatus('ok'); }
    catch (e) { synced = false; }
  }
  if (!synced) {
    setSyncStatus('bad');
    showToast('⚠️ Not synced — vote saved on this device only');
  }
}

document.getElementById('copyResults').addEventListener('click', () => {
  const byVenue = votesByVenue();
  const entries = VENUES
    .map(v => ({ v, voters: byVenue[v.id] || [] }))
    .filter(e => e.voters.length > 0)
    .sort((a, b) => b.voters.length - a.voters.length);
  if (!entries.length) { showToast('No votes to copy yet'); return; }
  const text = '🇮🇹 Villa vote results:\n' + entries.map(e =>
    `${e.voters.length} vote${e.voters.length === 1 ? '' : 's'} — ${e.v.name} (${e.voters.join(', ')})\n${e.v.url}`
  ).join('\n');
  navigator.clipboard.writeText(text)
    .then(() => showToast('Results copied — paste into the family chat!'))
    .catch(() => showToast('Copy failed — select and copy manually'));
});

document.getElementById('voterName').addEventListener('input', render);
render();
refresh();
setInterval(() => { if (document.visibilityState === 'visible') refresh(); }, POLL_MS);
</script>
</body>
</html>
